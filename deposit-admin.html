<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apexon | Admin Deposit Clearing Portal</title>

<!-- PWA MANIFEST LINK -->
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- SERVICE WORKER REGISTRATION SCRIPT -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('Apexon Deposit Node Engine Registered Successfully.'))
        .catch(err => console.log('Registration failed:', err));
    });
  }
</script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght=500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Space Grotesk', sans-serif;
        }
        body {
            background-color: #f1f5f9;
            color: #0f172a;
            padding: 30px 20px;
        }
        .container {
            max-width: 850px;
            margin: 0 auto;
        }
        header {
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #cbd5e1;
            padding-bottom: 15px;
        }
        h1 { font-size: 24px; color: #0f172a; }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .queue-count {
            background: #10b981;
            color: white;
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 14px;
            font-weight: 700;
            transition: all 0.3s ease;
        }
        .pulse-alert {
            animation: badgePulse 0.5s ease-in-out double alternate;
            background: #ef4444 !important;
        }
        @keyframes badgePulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.12); }
        }
        .empty-state {
            background: #ffffff;
            padding: 40px;
            text-align: center;
            border-radius: 16px;
            color: #64748b;
            border: 1px dashed #cbd5e1;
        }
        .ticket-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 18px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.03);
            animation: cardSlideIn 0.3s ease-out;
        }
        @keyframes cardSlideIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .ticket-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 14px;
            margin-bottom: 14px;
        }
        .user-info h3 { font-size: 16px; color: #1e293b; }
        .user-info p { font-size: 13px; color: #64748b; margin-top: 2px; }
        .tx-value { font-size: 20px; font-weight: 700; color: #10b981; text-align: right; }
        .channel-badge {
            display: inline-block;
            font-size: 11px;
            background: #e2e8f0;
            color: #334155;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 700;
            margin-top: 4px;
        }
        .ticket-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            font-size: 14px;
            color: #475569;
            margin-bottom: 18px;
            background: #f8fafc;
            padding: 14px;
            border-radius: 8px;
        }
        .input-reason {
            width: 100%;
            padding: 12px 14px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            margin-bottom: 14px;
            font-size: 13px;
            outline: none;
        }
        .input-reason:focus { border-color: #10b981; }
        .action-group {
            display: flex;
            gap: 12px;
        }
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }
        .btn:hover { opacity: 0.9; }
        .btn-approve { background: #10b981; color: white; }
        .btn-reject { background: #ef4444; color: white; }
        
        .audio-status-banner {
            font-size: 11px;
            background: #e2e8f0;
            color: #475569;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div>
                <h1>Deposit Approval Node</h1>
                <p style="font-size: 13px; color: #64748b;">Review and authorize incoming user account deposits</p>
            </div>
            <div class="header-actions">
                <div class="audio-status-banner" id="audioNotice">🔔 Audio Enabled</div>
                <span class="queue-count" id="queueBadge">0 Pending</span>
            </div>
        </header>

        <div id="queueContainer">
            <!-- Inbound deposit ledger records load here dynamically -->
        </div>
    </div>

    <script>
        var usersArray = [];
        var currentKnownPendingCount = 0;
        var initialLoadCompleted = false;

        function triggerChimeNotification() {
            try {
                var AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                var ctx = new AudioContext();
                
                var osc1 = ctx.createOscillator();
                var gain1 = ctx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(523.25, ctx.currentTime); // C5 Note
                gain1.gain.setValueAtTime(0.15, ctx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
                osc1.connect(gain1);
                gain1.connect(ctx.destination);
                
                setTimeout(function() {
                    var osc2 = ctx.createOscillator();
                    var gain2 = ctx.createGain();
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(659.25, ctx.currentTime); // E5 Note
                    gain2.gain.setValueAtTime(0.12, ctx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
                    osc2.connect(gain2);
                    gain2.connect(ctx.destination);
                    osc2.start();
                    osc2.stop(ctx.currentTime + 0.7);
                }, 100);

                osc1.start();
                osc1.stop(ctx.currentTime + 0.6);
            } catch (e) {
                console.log("Audio pipeline state mismatch: ", e);
            }
        }

        function checkAndSyncStorageData() {
            usersArray = JSON.parse(localStorage.getItem('apexon_users')) || [];
            var tempPendingCount = 0;

            usersArray.forEach(function(user) {
                if (user.transactions) {
                    user.transactions.forEach(function(tx) {
                        if (tx.status === "Pending Approval" && tx.description.includes("Deposit:")) {
                            tempPendingCount++;
                        }
                    });
                }
            });

            if (tempPendingCount !== currentKnownPendingCount || !initialLoadCompleted) {
                if (initialLoadCompleted && tempPendingCount > currentKnownPendingCount) {
                    triggerChimeNotification();
                    var badge = document.getElementById('queueBadge');
                    badge.classList.add('pulse-alert');
                    setTimeout(function() { badge.classList.remove('pulse-alert'); }, 600);
                }

                currentKnownPendingCount = tempPendingCount;
                renderDepositQueueDOM();
                initialLoadCompleted = true;
            }
        }

        function renderDepositQueueDOM() {
            var queueContainer = document.getElementById('queueContainer');
            queueContainer.innerHTML = '';
            var activeDisplayCounter = 0;

            usersArray.forEach(function(user, userIdx) {
                if (user.transactions) {
                    user.transactions.forEach(function(tx, txIdx) {
                        if (tx.status === "Pending Approval" && tx.description.includes("Deposit:")) {
                            activeDisplayCounter++;
                            
                            var symbol = user.currency || "$";
                            var displayMemo = tx.description.replace("Deposit: ", "");
                            var card = document.createElement('div');
                            card.className = 'ticket-card';
                            card.innerHTML = `
                                <div class="ticket-header">
                                    <div class="user-info">
                                        <h3>${user.fullName} (@${user.username})</h3>
                                        <p>Current Verified Balance: <strong>${symbol}${parseFloat(user.balance || 0).toLocaleString('en-US', { minimumFractionDigits: 2 })}</strong></p>
                                        <span class="channel-badge" style="background:#e8f5e9; color:#1b5e20;">${tx.channel || 'Inbound Settlement'}</span>
                                    </div>
                                    <div class="tx-value">
                                        <div>+${symbol}${parseFloat(tx.amount).toLocaleString('en-US', { minimumFractionDigits: 2 })}</div>
                                    </div>
                                </div>
                                <div class="ticket-details">
                                    <div><strong>Source Info:</strong> ${tx.sender || 'N/A'}</div>
                                    <div><strong>Transaction Memo:</strong> ${displayMemo}</div>
                                    <div><strong>Logged Clock:</strong> ${tx.date} | ${tx.time}</div>
                                    <div><strong>Intended Destination:</strong> Local Vault Node</div>
                                </div>
                                <input type="text" class="input-reason" id="reason_${userIdx}_${txIdx}" placeholder="Provide reference note or decline rationale here (Mandatory for cancellation)...">
                                <div class="action-group">
                                    <button class="btn btn-reject" onclick="executeDecision(${userIdx}, ${txIdx}, 'Reject')">Decline Request</button>
                                    <button class="btn btn-approve" onclick="executeDecision(${userIdx}, ${txIdx}, 'Approve')">Authorize Release</button>
                                </div>
                            `;
                            queueContainer.appendChild(card);
                        }
                    });
                }
            });

            document.getElementById('queueBadge').innerText = activeDisplayCounter + " Pending";
            if (activeDisplayCounter === 0) {
                queueContainer.innerHTML = '<div class="empty-state"><h3>Deposit Desk Clear</h3><p style="margin-top:5px; font-size:14px;">No incoming deposit requests are currently awaiting clearance confirmation loops.</p></div>';
            }
        }

        function executeDecision(userIdx, txIdx, adminAction) {
            var targetUser = usersArray[userIdx];
            var targetTx = targetUser.transactions[txIdx];
            var txAmount = parseFloat(targetTx.amount);
            var administrativeNote = document.getElementById(`reason_${userIdx}_${txIdx}`).value.trim();

            if (adminAction === 'Approve') {
                var currentBal = parseFloat(targetUser.balance || 0);
                
                // Credit the account balance on manual release approval
                targetUser.balance = (currentBal + txAmount).toFixed(2);
                targetTx.status = "Successful ✅";
                delete targetTx.rejectionReason; 
            } else {
                if (!administrativeNote) {
                    alert("An administrative tracking comment is required to drop this deposit sequence.");
                    return;
                }
                targetTx.status = "Rejected";
                targetTx.rejectionReason = administrativeNote;
            }

            localStorage.setItem('apexon_users', JSON.stringify(usersArray));
            checkAndSyncStorageData();
        }

        checkAndSyncStorageData();
        setInterval(checkAndSyncStorageData, 1500);

        document.body.addEventListener('click', function() {
            document.getElementById('audioNotice').style.display = 'none';
        }, { once: true });
    </script>
</body>
</html>
